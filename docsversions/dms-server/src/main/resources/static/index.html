<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - Document Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <h1>DMS</h1>
                <p class="tagline">Document Management System</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Потребителско име" required data-testid="username-input">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Парола" required data-testid="password-input">
                </div>
                <button type="submit" class="btn-primary" data-testid="login-button">
                    <span>Вход</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Демо акаунти: author / reviewer / admin</p>
            </div>
        </div>
        
        <div class="background-effects">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-page" class="page">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-file-alt"></i>
                    <span>DMS</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="documents" data-testid="nav-documents">
                    <i class="fas fa-folder"></i>
                    <span>Документи</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <span id="current-user" data-testid="current-user">user</span>
                        <span id="user-role" class="role-badge" data-testid="user-role">ROLE</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout" data-testid="logout-button">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Documents View -->
            <div id="documents-view" class="view active">
                <header class="view-header">
                    <div class="header-left">
                        <h1><i class="fas fa-folder-open"></i> Документи</h1>
                        <p class="subtitle">Управление на документи и версии</p>
                    </div>
                    <div class="header-actions">
                        <button id="create-doc-btn" class="btn-primary" data-testid="create-document-button">
                            <i class="fas fa-plus"></i>
                            <span>Нов документ</span>
                        </button>
                    </div>
                </header>

                <div class="content-area">
                    <div id="documents-grid" class="documents-grid" data-testid="documents-grid">
                        <!-- Documents will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Versions View -->
            <div id="versions-view" class="view">
                <header class="view-header">
                    <div class="header-left">
                        <button id="back-to-docs" class="btn-back" data-testid="back-to-documents">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <div>
                            <h1 id="doc-title" data-testid="document-title">Документ</h1>
                            <p class="subtitle">Версии на документа</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button id="create-version-btn" class="btn-primary" data-testid="create-version-button">
                            <i class="fas fa-plus"></i>
                            <span>Нова версия</span>
                        </button>
                    </div>
                </header>

                <div class="content-area">
                    <div id="versions-list" class="versions-list" data-testid="versions-list">
                        <!-- Versions will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Document Modal -->
    <div id="create-doc-modal" class="modal" data-testid="create-document-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-file-medical"></i> Нов документ</h2>
                <button class="modal-close" data-testid="close-modal">&times;</button>
            </div>
            <form id="create-doc-form">
                <div class="form-group">
                    <label for="doc-title-input">Заглавие на документа</label>
                    <input type="text" id="doc-title-input" placeholder="Въведете заглавие..." required data-testid="document-title-input">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary modal-cancel">Отказ</button>
                    <button type="submit" class="btn-primary" data-testid="submit-document">
                        <i class="fas fa-check"></i> Създай
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Version Modal -->
    <div id="create-version-modal" class="modal" data-testid="create-version-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-code-branch"></i> Нова версия</h2>
                <button class="modal-close" data-testid="close-version-modal">&times;</button>
            </div>
            <form id="create-version-form">
                <div class="form-group">
                    <label for="version-content-input">Съдържание на версията</label>
                    <textarea id="version-content-input" placeholder="Въведете съдържание..." rows="6" required data-testid="version-content-input"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary modal-cancel">Отказ</button>
                    <button type="submit" class="btn-primary" data-testid="submit-version">
                        <i class="fas fa-check"></i> Създай версия
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
